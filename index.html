<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>یارِ امتحان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f7f1e1;
    --paper-2: #efe6cf;
    --ink: #1f2a44;
    --ink-soft: #4a5578;
    --line: #c9beA0;
    --red: #b5432f;
    --red-2: #8f3223;
    --shadow: 0 10px 30px rgba(31,42,68,.12);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Vazirmatn', sans-serif;
    background:
      radial-gradient(circle at 20% -10%, rgba(181,67,47,.06), transparent 40%),
      radial-gradient(circle at 90% 110%, rgba(60,110,71,.06), transparent 40%),
      var(--paper);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 33px, rgba(31,42,68,.05) 34px);
    pointer-events:none;
    z-index:0;
  }
  .app{
    position:relative;
    z-index:1;
    width:100%;
    max-width:760px;
    padding:12px 10px;
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
  }
  header{
    text-align:center;
    padding:4px 0 10px;
    flex:none;
  }
  h1{
    font-family:'Caveat','Vazirmatn',sans-serif;
    font-size:28px;
    font-weight:700;
    margin:0;
    color:var(--ink);
  }
  .sub{
    color:var(--ink-soft);
    font-size:11.5px;
    margin:0;
  }
  .chat-wrap{
    flex:1;
    background:#fffdf7;
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
  }
  .chat-wrap::before{
    content:"";
    position:absolute;
    top:0; bottom:0;
    right:38px;
    width:1px;
    background:rgba(181,67,47,.25);
    z-index:0;
  }
  .messages{
    flex:1;
    padding:16px 16px 16px 12px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    position:relative;
    z-index:1;
    min-height:0;
  }
  .msg{
    max-width:82%;
    padding:11px 15px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.9;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg.bot{
    align-self:flex-start;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-bottom-left-radius:4px;
  }
  .msg.user{
    align-self:flex-end;
    background:var(--ink);
    color:var(--paper);
    border-bottom-right-radius:4px;
  }
  .msg .label{
    display:block;
    font-size:10.5px;
    font-weight:700;
    opacity:.55;
    margin-bottom:4px;
  }
  .typing{
    align-self:flex-start;
    display:flex;
    gap:4px;
    padding:12px 16px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:14px;
    border-bottom-left-radius:4px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--ink-soft);
    animation:bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{
    0%,60%,100%{transform:translateY(0); opacity:.5;}
    30%{transform:translateY(-4px); opacity:1;}
  }
  .input-row{
    display:flex;
    gap:8px;
    padding:14px 16px;
    border-top:1px solid var(--line);
    background:#fffdf7;
  }
  textarea{
    flex:1;
    resize:none;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 13px;
    font-family:'Vazirmatn',sans-serif;
    font-size:14.5px;
    background:var(--paper);
    color:var(--ink);
    line-height:1.6;
    max-height:120px;
  }
  textarea:focus{ outline:none; border-color:var(--red); }
  button.send{
    background:var(--red);
    color:#fffdf7;
    border:none;
    border-radius:10px;
    padding:0 20px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  button.send:hover{ background:var(--red-2); }
  button.send:disabled{ opacity:.5; cursor:not-allowed; }
  footer{
    text-align:center;
    padding-top:8px;
    font-size:10.5px;
    color:var(--ink-soft);
    flex:none;
  }
  footer b{ color:var(--ink); }
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}
  @media (prefers-reduced-motion: reduce){ .typing span{animation:none;} }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>یارِ امتحان</h1>
    <p class="sub">پایه‌های ۷،۸،۹،۱۱،۱۲ · رایگان</p>
  </header>

  <div class="chat-wrap">
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="سوالتو از هر درسی بپرس..."></textarea>
      <button class="send" id="sendBtn">بفرست</button>
    </div>
  </div>

  <footer>ساخته‌شده توسط <b>امیررضا</b> · تیم <b>amir game</b></footer>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

let history = [];

function addMessage(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  const label = document.createElement('span');
  label.className = 'label';
  label.textContent = role === 'user' ? 'تو' : 'یارِ امتحان';
  div.appendChild(label);
  const body = document.createElement('span');
  body.textContent = text;
  div.appendChild(body);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(){
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping(){
  const t = document.getElementById('typingIndicator');
  if(t) t.remove();
}

async function sendMessage(text){
  if(!text.trim()) return;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();

  try{
    // این آدرس نسبیه: به سرور خودمون (server.js) می‌ره، نه مستقیم به Anthropic
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await response.json();
    hideTyping();

    if(!response.ok){
      addMessage('bot', 'خطا: ' + (data.error || 'مشکل نامشخص'));
      history.pop();
      return;
    }

    addMessage('bot', data.reply);
    history.push({ role: 'assistant', content: data.reply });
  }catch(err){
    hideTyping();
    addMessage('bot', 'مشکل در ارتباط با سرور: ' + err.message);
    history.pop();
  }finally{
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
inputEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

addMessage('bot', 'سلام! 👋 من «یارِ امتحان»ام. هر سوالی از هر درسیِ پایه ۷، ۸، ۹، ۱۱ یا ۱۲ داری بپرس تا کمکت کنم.');
</script>
</body>
</html>
